<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Messy Mashup Genre Studio</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Project navigation">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">MM</span>
          <div>
            <h1>Messy Mashup</h1>
            <p>Genre Studio</p>
          </div>
        </div>

        <section class="panel">
          <h2>Audio Source</h2>
          <label class="drop-zone" for="audio-file">
            <input id="audio-file" type="file" accept="audio/*">
            <span class="drop-icon" aria-hidden="true">+</span>
            <span id="file-label">Choose audio</span>
          </label>
          <div class="source-actions">
            <button id="demo-button" type="button">Demo Mix</button>
            <button id="clear-button" type="button">Clear</button>
          </div>
        </section>

        <section class="panel compact">
          <h2>Model Mode</h2>
          <div class="segmented" role="group" aria-label="Prediction mode">
            <button class="active" type="button" data-mode="balanced">Balanced</button>
            <button type="button" data-mode="rhythm">Rhythm</button>
            <button type="button" data-mode="tone">Tone</button>
          </div>
        </section>

        <section class="panel compact">
          <h2>Controls</h2>
          <label class="toggle-row">
            <input id="normalize-toggle" type="checkbox" checked>
            <span>Normalize audio</span>
          </label>
          <label class="range-row" for="window-size">
            <span>Analysis window</span>
            <output id="window-output">2048</output>
          </label>
          <input id="window-size" type="range" min="1024" max="4096" value="2048" step="1024">
        </section>
      </aside>

      <section class="workspace" aria-live="polite">
        <header class="topbar">
          <div>
            <p class="eyebrow">Deep Learning & GenAI T12026</p>
            <h2>Audio Genre Classifier</h2>
          </div>
          <button id="download-button" type="button" disabled>Download Report</button>
        </header>

        <section class="stage">
          <div class="visualizer">
            <canvas id="waveform" aria-label="Waveform visualization"></canvas>
            <canvas id="spectrum" aria-label="Spectrum visualization"></canvas>
          </div>
          <div class="prediction">
            <p class="label">Prediction</p>
            <strong id="top-genre">Waiting</strong>
            <span id="confidence">Upload or load a demo mix</span>
          </div>
        </section>

        <section class="content-grid">
          <article class="panel metrics-panel">
            <h2>Signal Metrics</h2>
            <div id="metrics" class="metrics-grid">
              <div><span>Duration</span><strong>-</strong></div>
              <div><span>RMS</span><strong>-</strong></div>
              <div><span>Tempo</span><strong>-</strong></div>
              <div><span>Centroid</span><strong>-</strong></div>
              <div><span>Zero Cross</span><strong>-</strong></div>
              <div><span>High Band</span><strong>-</strong></div>
            </div>
          </article>

          <article class="panel scores-panel">
            <h2>Genre Scores</h2>
            <div id="scores" class="score-list"></div>
          </article>
        </section>
      </section>
    </main>

    <script src="./src/app.js"></script>
  </body>
</html>
